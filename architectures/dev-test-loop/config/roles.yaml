# ============================================================
# Agent 角色定义（框架层，跨项目复用）
# 参考：OpenCode Subagent 权限模型 + Octobots per-agent 进程
# ============================================================

agents:

  # ═══ Conductor Agent ═══
  # 定位：Human 唯一入口，框架通用，Discord 呈现
  # 职责：翻译指令→A2A 任务→分发→汇总→汇报
  conductor:
    description: "Human 唯一入口的总控 Agent，负责翻译自然语言指令为 A2A 任务、分发、汇总状态、汇报结果"
    model: "deepseek/deepseek-chat"
    permissions:
      write:
        - ".agents/memory/conductor/"
        - ".framework/config/"
        - ".framework/skills/"
      read:
        - "*"
      deny: []
    personality: "clear, concise, orchestrator"
    skill: ".framework/skills/conductor/SKILL.md"
    memory: ".agents/memory/conductor/"
    session: "persistent"
    discord:
      bot_name: "MultiAgent_Conductor"
      channels:
        - "指挥中心"
        - "系统告警"

  # ═══ PM Agent ═══
  # 定位：项目经理，纯后台，无 Discord
  # 职责：监控 Issue、分析任务、指派 Dev
  pm:
    description: "项目经理，监控 Git Issue，分析任务根因，按复杂度路由指派 Dev"
    model: "deepseek/deepseek-chat"
    permissions:
      write:
        - "docs/"
        - ".agents/memory/pm/"
      read:
        - "src/"
        - "scripts/"
        - "tests/"
        - "docs/"
      deny:
        - "src/"
        - "scripts/"
        - "tests/"
    personality: "analytical, thorough, systematic"
    skill: ".framework/skills/pm/SKILL.md"
    memory: ".agents/memory/pm/"
    session: "per-issue"

  # ═══ Dev Agent ═══
  # 定位：研发工程师，纯后台，在隔离分支工作
  # 职责：在隔离分支修改源码，提交 PR
  dev:
    description: "代码修复专家，在隔离分支工作，禁止修改测试用例"
    model: "deepseek/deepseek-chat"
    permissions:
      write:
        - "src/"
        - "scripts/"
        - ".agents/memory/dev/"
      read:
        - "src/"
        - "scripts/"
        - "docs/"
        - "tests/"
      deny:
        - "tests/"
        - "docs/"
    personality: "methodical, careful, act-dont-ask"
    skill: ".framework/skills/dev/SKILL.md"
    memory: ".agents/memory/dev/"
    session: "per-issue"

  # ═══ Test Agent ═══
  # 定位：测试工程师，纯后台
  # 职责：编写/管理测试用例，跑 CI，审批打回
  test:
    description: "测试工程师，只运行测试和审查代码，不修改源码"
    model: "deepseek/deepseek-chat"
    permissions:
      write:
        - "tests/"
        - ".agents/memory/test/"
      read:
        - "src/"
        - "scripts/"
        - "tests/"
      deny:
        - "src/"
        - "scripts/"
    personality: "evidence-obsessed, skeptical"
    skill: ".framework/skills/test/SKILL.md"
    memory: ".agents/memory/test/"
    session: "per-pr"

  # ═══ User Agent ═══
  # 定位：业务闭环驱动者，纯后台，项目专用
  # 职责：由接入项目定义具体业务逻辑
  user-agent:
    description: "业务闭环驱动者，驱动项目工具链，异常时自动触发基建闭环"
    model: "deepseek/deepseek-chat"
    permissions:
      write:
        - "results/"
        - "logs/"
        - ".agents/memory/user-agent/"
      read:
        - "src/"
        - "scripts/"
        - "docs/"
      deny: []
    personality: "efficient, autonomous, resilient"
    skill: ".framework/skills/user-agent/SKILL.md"
    memory: ".agents/memory/user-agent/"
    session: "persistent"

    runtime: "claude-code"     # 运行时适配器: claude-code | opencode

# ═══ 全局设置 ═══
global:
  runtime: "claude-code"       # 默认运行时
  escalation:
    max_rejections: 3          # Dev 同一 Issue 被 Test 打回 >= 3 次 → escalated
    escalation_target: "conductor"
  timeout:
    default: 600               # 默认 Agent 超时（秒）
    pm_analysis: 300
    dev_fix: 1800
    test_verify: 900
  retry:
    default_max: 3
    backoff: "exponential"
    base_delay: 5              # 秒
  guard:
    enabled: true
    log_path: "logs/guard.log"
