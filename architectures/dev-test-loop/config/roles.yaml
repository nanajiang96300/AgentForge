agents:
  conductor:
    description: Human 唯一入口的总控 Agent，负责翻译自然语言指令为 A2A 任务、分发、汇总状态、汇报结果
    discord:
      bot_name: MultiAgent_Conductor
      channels:
      - 指挥中心
      - 系统告警
    memory: .agents/memory/conductor/
    model: deepseek-v4-flash
    permissions:
      deny: []
      read:
      - '*'
      write:
      - .agents/memory/conductor/
      - .framework/config/
      - architectures/dev-test-loop/skills/
    personality: clear, concise, orchestrator
    session: persistent
    skill: architectures/dev-test-loop/skills/conductor/SKILL.md
  dev:
    description: 代码修复专家，在隔离分支工作，禁止修改测试用例
    memory: .agents/memory/dev/
    model: deepseek-v4-pro
    permissions:
      deny:
      - tests/
      - docs/
      read:
      - src/
      - scripts/
      - docs/
      - tests/
      write:
      - src/
      - scripts/
      - .agents/memory/dev/
    personality: methodical, careful, act-dont-ask
    session: per-issue
    skill: architectures/dev-test-loop/skills/dev/SKILL.md
  pm:
    description: 项目经理，监控 Git Issue，分析任务根因，按复杂度路由指派 Dev
    memory: .agents/memory/pm/
    model: deepseek-v4-pro
    permissions:
      deny:
      - src/
      - scripts/
      - tests/
      read:
      - src/
      - scripts/
      - tests/
      - docs/
      write:
      - docs/
      - .agents/memory/pm/
    personality: analytical, thorough, systematic
    session: per-issue
    skill: architectures/dev-test-loop/skills/pm/SKILL.md
  test:
    description: 测试工程师，只运行测试和审查代码，不修改源码
    memory: .agents/memory/test/
    model: deepseek-v4-flash
    permissions:
      deny:
      - src/
      - scripts/
      read:
      - src/
      - scripts/
      - tests/
      write:
      - tests/
      - .agents/memory/test/
    personality: evidence-obsessed, skeptical
    session: per-pr
    skill: architectures/dev-test-loop/skills/test/SKILL.md
  user-agent:
    description: 业务闭环驱动者，驱动项目工具链，异常时自动触发基建闭环
    memory: .agents/memory/user-agent/
    model: deepseek-v4-pro
    permissions:
      deny: []
      read:
      - src/
      - scripts/
      - docs/
      write:
      - results/
      - logs/
      - .agents/memory/user-agent/
    personality: efficient, autonomous, resilient
    runtime: claude-code
    session: persistent
    skill: architectures/dev-test-loop/skills/user-agent/SKILL.md
global:
  escalation:
    escalation_target: conductor
    max_rejections: 3
  guard:
    enabled: true
    log_path: logs/guard.log
  retry:
    backoff: exponential
    base_delay: 5
    default_max: 3
  runtime: claude-code
  timeout:
    default: 600
    dev_fix: 1800
    pm_analysis: 300
    test_verify: 900
