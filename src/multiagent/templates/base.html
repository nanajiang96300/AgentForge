<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% if auto_refresh %}
  <meta http-equiv="refresh" content="15">
  {% endif %}
  <title>{% block title %}AgentForge{% endblock %} — AgentForge</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad:false,theme:'dark',securityLevel:'loose'});</script>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
<div class="container">
  <header>
    <h1><a href="/">🤖 AgentForge Dashboard</a></h1>
    <nav>
      <a href="/" {% if active_page == 'index' %}class="active"{% endif %}>Pipeline Monitoring</a>
      <a href="/designer" {% if active_page == 'designer' %}class="active"{% endif %}>Designer</a>
      <a href="/commands" {% if active_page == 'commands' %}class="active"{% endif %}>Commands</a>
    </nav>
  </header>
  <div class="refresh" id="clock"></div>
  <script>document.getElementById('clock').textContent='Updated: '+new Date().toLocaleTimeString();</script>

  {% block content %}{% endblock %}

  <footer>AgentForge v0.7.0 • Multi-Agent Framework</footer>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
