{% extends "base.html" %}
{% block title %}Commands{% endblock %}

{% block content %}

<div class="section">
  <h2>⚡ Command Center</h2>
  <div class="grid">
    <div class="stat-card" style="cursor:pointer;" onclick="runCmd('pm list')">
      <div class="label">📋 List Tasks</div>
    </div>
    <div class="stat-card" style="cursor:pointer;" onclick="runCmd('conductor status')">
      <div class="label">📊 Status</div>
    </div>
    <div class="stat-card" style="cursor:pointer;" onclick="runCmd('metrics')">
      <div class="label">💰 Costs</div>
    </div>
    <div class="stat-card" style="cursor:pointer;" onclick="runCmd('agent list')">
      <div class="label">🤖 Agents</div>
    </div>
  </div>

  <form method="post" style="margin-top:16px;">
    <input name="command" id="cmd-input" placeholder="e.g. conductor status"
           style="width:100%;padding:10px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:1em;margin-bottom:8px;">
    <button type="submit" class="btn btn-green">Run</button>
  </form>
  <pre id="cmd-result" style="background:#0d1117;color:var(--green);padding:12px;border-radius:4px;margin-top:12px;max-height:400px;overflow:auto;">{{ result }}</pre>
</div>

{% endblock %}

{% block scripts %}
<script>
function runCmd(c) {
  document.getElementById('cmd-input').value = c;
  document.forms[0].submit();
}
</script>
{% endblock %}
